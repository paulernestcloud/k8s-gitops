# mysql-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "my-secret-password" # Keep this simple for now, but use a Secret later!
            - name: MYSQL_DATABASE
              value: "testdb"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql # Where MySQL stores its data files
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
